<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIP Gamer Freedom Countdown</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            font-family: "Comic Sans MS", "Comic Sans", "Comic Neue", cursive, sans-serif; 
        }
    </style>
</head>
<body class="bg-zinc-900 text-white min-h-screen flex flex-col items-center justify-center p-4 relative overflow-hidden select-none">

    <canvas id="emoji-canvas" class="absolute inset-0 w-full h-full pointer-events-none z-0"></canvas>

    <div class="w-full max-w-sm border-4 border-yellow-400 bg-emerald-500/30 backdrop-blur-md p-6 rounded-3xl shadow-2xl text-center z-10 border-double ring-4 ring-cyan-400/50 m-2">
        
        <div class="text-5xl mb-2 animate-bounce">🎮😭</div>
        <h1 class="text-3xl font-extrabold tracking-wide text-yellow-300 uppercase drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)]">
            GAME OVER BRO!
        </h1>
        <p class="text-base text-cyan-200 mt-2 font-bold bg-black/40 py-1 px-2 rounded-xl">
            Say goodbye to your RGB rig and late-night Discord calls in 
        </p>

        <div class="grid grid-cols-4 gap-2 my-6">
            <div class="bg-cyan-400/20 border-2 border-cyan-400 p-2 rounded-2xl backdrop-blur-sm shadow-md">
                <span id="days" class="text-2xl font-black text-yellow-300 drop-shadow-[0_1px_2px_rgba(0,0,0,0.5)]">00</span>
                <div class="text-[11px] text-white font-bold uppercase tracking-wider">Days</div>
            </div>
            <div class="bg-amber-400/20 border-2 border-amber-400 p-2 rounded-2xl backdrop-blur-sm shadow-md">
                <span id="hours" class="text-2xl font-black text-orange-300 drop-shadow-[0_1px_2px_rgba(0,0,0,0.5)]">00</span>
                <div class="text-[11px] text-white font-bold uppercase tracking-wider">Hrs</div>
            </div>
            <div class="bg-lime-400/20 border-2 border-lime-400 p-2 rounded-2xl backdrop-blur-sm shadow-md">
                <span id="minutes" class="text-2xl font-black text-lime-300 drop-shadow-[0_1px_2px_rgba(0,0,0,0.5)]">00</span>
                <div class="text-[11px] text-white font-bold uppercase tracking-wider">Min</div>
            </div>
            <div class="bg-rose-400/20 border-2 border-rose-400 p-2 rounded-2xl backdrop-blur-sm shadow-md">
                <span id="seconds" class="text-2xl font-black text-rose-300 drop-shadow-[0_1px_2px_rgba(0,0,0,0.5)]">00</span>
                <div class="text-[11px] text-white font-bold uppercase tracking-wider">Sec</div>
            </div>
        </div>

        <div class="mt-6 mb-2 bg-black/30 p-3 rounded-2xl border border-white/10">
            <div class="flex justify-between text-xs font-black text-yellow-200 mb-1 px-1">
                <span>🎮 Laptop Battery / Freedom:</span>
                <span id="percentage-text" class="text-rose-400">100%</span>
            </div>
            <div class="w-full bg-zinc-950 border-2 border-cyan-400 h-6 rounded-full overflow-hidden p-0.5 shadow-inner">
                <div id="progress-bar" class="bg-gradient-to-r from-rose-500 via-yellow-400 to-lime-400 h-full rounded-full transition-all duration-1000 ease-out" style="width: 100%"></div>
            </div>
        </div>

        <div class="bg-black/60 border-2 border-yellow-400/70 rounded-2xl p-3 mt-6 min-h-[65px] flex items-center justify-center">
            <p id="tease-console" class="text-sm text-yellow-300 font-bold tracking-wide">
                Closing all launcher apps permanently...
            </p>
        </div>
    </div>

    <script>
        // Canvas Setup for Falling Crying Emojis
        const canvas = document.getElementById('emoji-canvas');
        const ctx = canvas.getContext('2d');
        
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        const emojis = ['😭', '😢', '📉', '🔒', '🔌'];
        const particles = Array.from({ length: 25 }, () => ({
            x: Math.random() * width,
            y: Math.random() * height - height,
            speed: Math.random() * 2 + 1,
            size: Math.random() * 20 + 20,
            text: emojis[Math.floor(Math.random() * emojis.length)]
        }));

        function drawParticles() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => {
                ctx.font = `${p.size}px Arial`;
                ctx.fillText(p.text, p.x, p.y);
                p.y += p.speed;
                if (p.y > height) {
                    p.y = -50;
                    p.x = Math.random() * width;
                }
            });
            requestAnimationFrame(drawParticles);
        }
        drawParticles();

        // Countdown Logic (Target: July 4, 2026)
        const targetDate = new Date('July 4, 2026 00:00:00').getTime();
        const startDate = new Date('June 21, 2026 00:00:00').getTime();
        const totalDuration = targetDate - startDate;

        const dynamicPhrases = [
            "⚠️ Alert: Freedom ends when the countdown hits zero!",
            "🛑 Steam account status: Pending uninstallation...",
            "🔌 Warning: Your laptop is about to accumulate infinite dust.",
            "🤫 Your new main game: 'Doing chores simulator 2026'.",
            "📉 Cooldown time on your gaming license is lasting forever.",
            "🥀 RIP to your rank status. Say hello to casual target shopping.",
            "🛒 Honey, wake up, your daily quests are grocery shopping now."
        ];

        function updateCountdown() {
            const now = new Date().getTime();
            const timeRemaining = targetDate - now;

            if (timeRemaining <= 0) {
                document.getElementById('days').innerText = "00";
                document.getElementById('hours').innerText = "00";
                document.getElementById('minutes').innerText = "00";
                document.getElementById('seconds').innerText = "00";
                document.getElementById('percentage-text').innerText = "0%";
                document.getElementById('progress-bar').style.width = "0%";
                document.getElementById('tease-console').innerText = "🔒 Server closed. Marriage initialized. Hand over the controller! 🎉";
                return;
            }

            const days = Math.floor(timeRemaining / (1000 * 60 * 60 * 24));
            const hours = Math.floor((timeRemaining % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((timeRemaining % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((timeRemaining % (1000 * 60)) / 1000);

            document.getElementById('days').innerText = String(days).padStart(2, '0');
            document.getElementById('hours').innerText = String(hours).padStart(2, '0');
            document.getElementById('minutes').innerText = String(minutes).padStart(2, '0');
            document.getElementById('seconds').innerText = String(seconds).padStart(2, '0');

            const elapsed = now - startDate;
            let currentPct = 100 - ((elapsed / totalDuration) * 100);
            currentPct = Math.max(0, Math.min(100, currentPct)); 
            
            document.getElementById('percentage-text').innerText = `${currentPct.toFixed(4)}%`;
            document.getElementById('progress-bar').style.width = `${currentPct}%`;

            const phraseIndex = Math.floor(seconds / 8) % dynamicPhrases.length;
            document.getElementById('tease-console').innerText = dynamicPhrases[phraseIndex];
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
