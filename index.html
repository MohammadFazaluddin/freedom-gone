<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamer Status: Expiring Forever</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-50 min-h-screen flex flex-col items-center justify-center p-4 relative overflow-hidden select-none">

    <canvas id="emoji-canvas" class="absolute inset-0 w-full h-full pointer-events-none z-0"></canvas>

    <div class="w-full max-w-sm border-2 border-cyan-500 bg-zinc-900/80 backdrop-blur-md p-6 rounded-3xl shadow-2xl text-center z-10 m-2">
        
        <div class="flex justify-center items-center gap-4 mb-4 text-cyan-400">
            <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24">
                <path d="M2 5v14h20V5H2zm18 12h-2v-2h2v2zm0-4h-2v-2h2v2zm-6 2h-2v2h-2v-2H8v-2h2v-2h2v2h2v2z"/>
            </svg>
            <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24">
                <path d="M4 2h2v2H4V2zm14 0h-2v2h2V2zM6 6h12v2H6V6zm-2 4h16v2H4v-2zm2 4h2v2H6v-2zm10 0h2v2h-2v-2zm-6 4h4v2h-4v-2z"/>
            </svg>
            <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24">
                <path d="M18 2h4v4h-2V4h-2V2zm-2 4h2v2h-2V6zm-2 2h2v2h-2V8zm-2 2h2v2h-2v-2zm-2 2h2v2H8v-2zm-2 2h2v2H6v-2zm-2 2h2v2H4v-2zm-2 2h2v2H2v-2z"/>
            </svg>
        </div>

        <h1 class="text-4xl font-extrabold tracking-tight text-cyan-400 uppercase mb-4">
            GAME OVER
        </h1>
        
        <div class="bg-black/40 border border-zinc-800 rounded-2xl p-4 my-4">
            <p class="text-xl font-extrabold text-amber-400 uppercase tracking-wide">
                ⚠️ WARNING:
            </p>
            <p class="text-base font-semibold text-zinc-100 mt-1 leading-snug">
                Your laptop access is about to accumulate infinite dust.
            </p>
            <p class="text-xs font-bold text-cyan-300 mt-3 border-t border-zinc-800/60 pt-2 uppercase tracking-wider">
                Alert: "Yes Honey v2.0" is about to become your only active program.
            </p>
        </div>

        <div class="grid grid-cols-4 gap-2 my-5">
            <div class="bg-zinc-950/90 border border-cyan-500/30 p-2 rounded-xl">
                <span id="days" class="text-2xl font-extrabold text-cyan-400">00</span>
                <div class="text-[10px] text-zinc-500 font-semibold uppercase tracking-wider">Days</div>
            </div>
            <div class="bg-zinc-950/90 border border-cyan-500/30 p-2 rounded-xl">
                <span id="hours" class="text-2xl font-extrabold text-cyan-400">00</span>
                <div class="text-[10px] text-zinc-500 font-semibold uppercase tracking-wider">Hrs</div>
            </div>
            <div class="bg-zinc-950/90 border border-cyan-500/30 p-2 rounded-xl">
                <span id="minutes" class="text-2xl font-extrabold text-cyan-400">00</span>
                <div class="text-[10px] text-zinc-500 font-semibold uppercase tracking-wider">Min</div>
            </div>
            <div class="bg-zinc-950/90 border border-cyan-500/30 p-2 rounded-xl">
                <span id="seconds" class="text-2xl font-extrabold text-cyan-400">00</span>
                <div class="text-[10px] text-zinc-500 font-semibold uppercase tracking-wider">Sec</div>
            </div>
        </div>

        <div class="mt-5 mb-2 bg-zinc-950/50 p-3 rounded-2xl border border-zinc-800">
            <div class="flex justify-between text-xs font-semibold text-zinc-400 mb-1 px-1">
                <span>Estimated Freedom Level:</span>
                <span id="percentage-text" class="text-cyan-400 font-bold">100%</span>
            </div>
            <div class="w-full bg-zinc-900 border border-zinc-800 h-4 rounded-full overflow-hidden p-0.5">
                <div id="progress-bar" class="bg-cyan-500 h-full rounded-full transition-all duration-1000 ease-out" style="width: 100%"></div>
            </div>
        </div>

        <div class="bg-zinc-950/90 border border-zinc-800 rounded-xl p-3 mt-5 min-h-[65px] flex items-center justify-center">
            <p id="tease-console" class="text-xs text-cyan-300 font-semibold tracking-wide">
                Analyzing remaining single-life gaming runtime...
            </p>
        </div>
    </div>

    <script>
        // Canvas Setup for Falling Crying Emojis
        const canvas = document.getElementById('emoji-canvas');
        const ctx = canvas.getContext('2d');
        
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        const emojis = ['😭', '😢', '📉', '🔒', '🔌'];
        const particles = Array.from({ length: 20 }, () => ({
            x: Math.random() * width,
            y: Math.random() * height - height,
            speed: Math.random() * 1.5 + 0.5,
            size: Math.random() * 15 + 20,
            text: emojis[Math.floor(Math.random() * emojis.length)]
        }));

        function drawParticles() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => {
                ctx.font = `${p.size}px Arial`;
                ctx.fillStyle = "rgba(255, 255, 255, 0.15)";
                ctx.fillText(p.text, p.x, p.y);
                p.y += p.speed;
                if (p.y > height) {
                    p.y = -50;
                    p.x = Math.random() * width;
                }
            });
            requestAnimationFrame(drawParticles);
        }
        drawParticles();

        // FIXED COUNTDOWN: Syncing accurately with current timeline target (July 4th, 2026)
        const currentYear = new Date().getFullYear(); 
        const targetDate = new Date(`July 4, ${currentYear} 00:00:00`).getTime();
        const startDate = new Date(`June 21, ${currentYear} 00:00:00`).getTime();
        const totalDuration = targetDate - startDate;

        const dynamicPhrases = [
            "⚠️ Alert: Freedom ends when the countdown hits zero!",
            "🛑 Steam account status: Pending uninstallation...",
            "🔌 Warning: Your laptop is about to accumulate infinite dust.",
            "🤫 Your new main game: 'Doing chores simulator 2026'.",
            "📉 Cooldown time on your gaming license is lasting forever.",
            "🥀 RIP to your rank status. Say hello to casual target shopping.",
            "🛒 Honey, wake up, your daily quests are grocery shopping now."
        ];

        function updateCountdown() {
            const now = new Date().getTime();
            const timeRemaining = targetDate - now;

            if (timeRemaining <= 0) {
                document.getElementById('days').innerText = "00";
                document.getElementById('hours').innerText = "00";
                document.getElementById('minutes').innerText = "00";
                document.getElementById('seconds').innerText = "00";
                document.getElementById('percentage-text').innerText = "0%";
                document.getElementById('progress-bar').style.width = "0%";
                document.getElementById('tease-console').innerText = "🔒 Server closed. Marriage initialized. Hand over the controller! 🎉";
                return;
            }

            const days = Math.floor(timeRemaining / (1000 * 60 * 60 * 24));
            const hours = Math.floor((timeRemaining % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((timeRemaining % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((timeRemaining % (1000 * 60)) / 1000);

            document.getElementById('days').innerText = String(days).padStart(2, '0');
            document.getElementById('hours').innerText = String(hours).padStart(2, '0');
            document.getElementById('minutes').innerText = String(minutes).padStart(2, '0');
            document.getElementById('seconds').innerText = String(seconds).padStart(2, '0');

            const elapsed = now - startDate;
            let currentPct = 100 - ((elapsed / totalDuration) * 100);
            currentPct = Math.max(0, Math.min(100, currentPct)); 
            
            document.getElementById('percentage-text').innerText = `${currentPct.toFixed(4)}%`;
            document.getElementById('progress-bar').style.width = `${currentPct}%`;

            const phraseIndex = Math.floor(seconds / 8) % dynamicPhrases.length;
            document.getElementById('tease-console').innerText = dynamicPhrases[phraseIndex];
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
